services:

  iris-dev:
    build:
      args:
        IMAGE: containers.intersystems.com/intersystems/irishealth:latest-em
      context: iris
    container_name: ${IRIS_INSTANCE_NAME}-dev
    hostname: ${IRIS_INSTANCE_NAME}-dev
    ports:
      - ${IRIS_PORT_DEV}:1972
      - 9000-9200:9000-9200
    volumes:
      - dev_${ISC_DATA_DIRECTORY}:/${ISC_DATA_DIRECTORY}
      - dev_journal:/journal
      - dev_journal2:/journal2
      - dev_WIJ:/WIJ
      - ./iris/key/iris.key:/tmp/iris.key:ro
      - ./iris/src:/code
      - ./data:/data
      - ./merge-dev.cpf:/merge.cpf
    command: --key /tmp/iris.key
    restart: unless-stopped
    environment:
      - TZ=Europe/Paris
      - ISC_DATA_DIRECTORY=/${ISC_DATA_DIRECTORY}
      - ISC_CPF_MERGE_FILE=/merge.cpf
    healthcheck:
      test: ["CMD", "iris", "session", "iris", "-U", "%SYS", "##class(%Api.Atelier).GetServer()"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
  iris-prod:
    build:
      args:
        IMAGE: containers.intersystems.com/intersystems/irishealth:latest-em
      context: iris
    container_name: ${IRIS_INSTANCE_NAME}-prod
    hostname: ${IRIS_INSTANCE_NAME}-prod
    ports:
      - ${IRIS_PORT_PROD}:1972
      - 9500-9700:9500-9700
    volumes:
      - prod_${ISC_DATA_DIRECTORY}:/${ISC_DATA_DIRECTORY}
      - prod_journal:/journal
      - prod_journal2:/journal2
      - prod_WIJ:/WIJ
      - ./iris/key/iris.key:/tmp/iris.key:ro
      - ./iris/src:/code
      - ./data:/data
      - ./merge-prod.cpf:/merge.cpf
    command: --key /tmp/iris.key
    restart: unless-stopped
    environment:
      - TZ=Europe/Paris
      - ISC_DATA_DIRECTORY=/${ISC_DATA_DIRECTORY}
      - ISC_CPF_MERGE_FILE=/merge.cpf
    healthcheck:
      test: ["CMD", "iris", "session", "iris", "-U", "%SYS", "##class(%Api.Atelier).GetServer()"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
 
  webgateway: # Used for VS Code ObjectScript extension to connect to /api/atelier and for IRIS Administration Portal
    image: containers.intersystems.com/intersystems/webgateway:latest-em
    container_name: ${IRIS_INSTANCE_NAME}-webgateway
    depends_on:
      - iris-dev
      - iris-prod
    expose:
      - "80"
    restart: unless-stopped
    environment:
    - ISC_CSP_CONF_FILE=/webgateway/CSP.conf
    - ISC_CSP_INI_FILE=/webgateway/CSP.ini
    volumes:
    - type: bind
      source: ./webgateway
      target: /webgateway
    networks:
      - default

  nginx: # Serves the Angular app on /app/ and proxies everything else to the webgateway
    image: nginx:alpine
    container_name: ${IRIS_INSTANCE_NAME}-nginx
    depends_on:
      - webgateway
    ports:
      - ${WEBGATEWAY_PORT_HTTP}:80
    volumes:
    - type: bind
      source: ./nginx/nginx.conf
      target: /etc/nginx/conf.d/default.conf
      read_only: true
    - type: bind
      source: ./iris/angular/dist/hl7-client/browser
      target: /usr/share/nginx/html/app
      read_only: true
    restart: unless-stopped
    networks:
      - default
 
volumes:
  dev_databases:
    external: true
    name: ${IRIS_INSTANCE_NAME}_dev_databases  
  dev_journal:
    external: true
    name: ${IRIS_INSTANCE_NAME}_dev_journal
  dev_journal2:
    external: true
    name: ${IRIS_INSTANCE_NAME}_dev_journal2
  dev_WIJ:
    external: true
    name: ${IRIS_INSTANCE_NAME}_dev_WIJ
  prod_databases:
    external: true
    name: ${IRIS_INSTANCE_NAME}_prod_databases
  prod_journal:
    external: true
    name: ${IRIS_INSTANCE_NAME}_prod_journal
  prod_journal2:
    external: true
    name: ${IRIS_INSTANCE_NAME}_prod_journal2
  prod_WIJ:
    external: true
    name: ${IRIS_INSTANCE_NAME}_prod_WIJ