server {
    listen 80;

    # ── Angular SPA — served as static files ──────────────────────────────
    # Built with: ng build --configuration cloud  (baseHref=/app/)
    # Files mounted at /usr/share/nginx/html/app/ (see docker-compose.yml).
    location = /app {
        return 301 /app/;
    }

    location /app/ {
        root /usr/share/nginx/html;
        # SPA fallback: unknown sub-paths return index.html
        try_files $uri $uri/ /app/index.html;
    }

    # ── Everything else → IRIS via webgateway ─────────────────────────────
    location / {
        proxy_pass         http://webgateway:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
